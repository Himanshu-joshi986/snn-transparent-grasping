# configs/snn.yaml — Spiking U-Net baseline configuration
defaults:
  - base

model:
  name: "spiking_unet"
  in_channels: 2
  out_channels: 1
  time_steps: 10
  base_channels: 64
  encoder_channels: [64, 128, 256, 512]
  decoder_channels: [256, 128, 64, 32]

  lif:
    tau: 2.0
    v_threshold: 1.0
    v_reset: 0.0
    surrogate: "atan"
    detach_reset: true

training:
  epochs: 50
  batch_size: 8
  lr: 5.0e-5